<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- disconnecting the script for now -->
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/75068ce81f.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="main">
        <div class="game-board-heading">
            <h1>TIC TAC TOE</h1>
        </div>
        <div class="game-board">
            <!-- each .marker will get adjacent classes by JS -->
            <!-- fa-solid fa-x for X -->
            <!-- fa-solid fa-o for O -->
            <div class="block">
                <i class="marker fa-solid" data-index="0"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="1"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="2"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="3"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="4"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="5"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="6"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="7"></i>
            </div>
            <div class="block">
                <i class="marker fa-solid" data-index="8"></i>
            </div>
        </div>
    </div>
    <div class="restart-button">
        RESTART
    </div>
</body>
</html>
